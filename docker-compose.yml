services:
  sfu:
    build: .
    image: webrtc-sfu-4k:latest
    ports:
      - "8080:8080"
      - "10000:10000/udp"
      - "10000:10000/tcp"
    environment:
      NODE_ENV: production
      PORT: "8080"
      RTC_PORT: "10000"
      ANNOUNCED_IP: ${ANNOUNCED_IP:-}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e",
        "require('http').get('http://localhost:'+process.env.PORT+'/health',r=>{process.exit(r.statusCode===200?0:1)}).on('error',()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
