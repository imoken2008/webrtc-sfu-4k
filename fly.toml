app = "webrtc-sfu-4k"
primary_region = "nrt"

[build]

[env]
  PORT = "8080"
  RTC_PORT = "10000"
  NODE_ENV = "production"
  ANNOUNCED_IP = "2a09:8280:1::12f:c998:0"

# HTTP signaling (fly.io が HTTPS を自動付与)
[[services]]
  internal_port = 8080
  protocol = "tcp"
  min_machines_running = 1

  [[services.ports]]
    handlers = ["http"]
    port = 80
    force_https = true

  [[services.ports]]
    handlers = ["tls", "http"]
    port = 443

  [[services.tcp_checks]]
    interval = "15s"
    timeout = "2s"
    grace_period = "5s"

# WebRTC メディア (UDP, 単一ポート)
[[services]]
  internal_port = 10000
  protocol = "udp"

  [[services.ports]]
    port = 10000

# WebRTC メディア TCP フォールバック
[[services]]
  internal_port = 10000
  protocol = "tcp"

  [[services.ports]]
    port = 10000
